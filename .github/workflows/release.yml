name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ququer-linux-amd64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ququer-linux-arm64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ququer-darwin-amd64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ququer-darwin-arm64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/ququer ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/ququer-linux-amd64/ququer-linux-amd64 \
            artifacts/ququer-linux-arm64/ququer-linux-arm64 \
            artifacts/ququer-darwin-amd64/ququer-darwin-amd64 \
            artifacts/ququer-darwin-arm64/ququer-darwin-arm64 \
            skills/ququer-agent/SKILL.md
